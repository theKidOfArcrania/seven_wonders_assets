# =====================================================================
# 7 Wonders (base game) - card database
# =====================================================================

meta:
  game: "7 Wonders (base game)"
  illustration_style: |
    Appended to every card's illustration_prompt when generating art. Scenes
    describe ONLY the illustration subject - never mention cards, borders or frames.

    Style: painterly digital illustration, warm cinematic lighting, semi-realistic, muted earthy palette, classical antiquity art style. Portrait-orientation scene with no borders, no frame and no text.
  background_style: |
    Appended to every wonder's background_prompt when generating the panorama
    backdrop. It enforces a CONSISTENT reserved building zone so the separate
    monument overlay always lands in the same place, and so a wonder's Day and
    Night backdrops (Night is derived from Day) share the same open area. It is
    NOT appended to building_prompt (isolated monuments carry their own style).

    Framing: wide landscape panorama, no text, no borders, no frame. Keep the LEFT-CENTER foreground - roughly 20% to 36% of the image width from the left edge - as flat, open, empty ground: a bare plaza, foundation, jetty or water with NO large structures, statues or trees. This area is reserved for a separate monument that is composited on top, so it must stay clear. Push the city, harbour and detailed architecture toward the right side and the background. Slightly desaturated so foreground UI reads clearly.
  building_style: |
    Appended to every wonder's building_prompt (Day side) when generating the
    isolated monument. The image is rendered with a genuinely transparent
    background, so this reinforces clean isolation with no ground or shadow.

    Isolation: the monument stands completely alone on a fully transparent background. Absolutely no ground plane, floor, terrain, plinth surroundings, cast shadow, contact shadow, reflection, haze, mist or glow beneath or around the base. Nothing but the structure itself, cropped cleanly against empty transparency. It is ONE single, continuous, physically connected monument - the stage tiers are visual registers stacked bottom-to-top, never split apart or floating with gaps between them; any figure or body stays whole and joined. Even neutral lighting, no scenery, no text, no borders.
  wonder_art: |
    Each entry under `wonders:` carries THREE image prompts, used by the immersive
    "city panorama" client UI (see design/seven-wonders/ui-design.md):

    * illustration_prompt - the wonder's hero portrait, same convention as a card's
      illustration_prompt (SUBJECT ONLY; meta.illustration_style is appended).
      Day sides are lit by daylight, Night sides by dusk/moonlight/torches.
      Day and Night are generated independently (they may differ slightly).
    * background_prompt - the wide LANDSCAPE cityscape backdrop that tiles into the
      horizontal panorama; meta.background_style IS appended to reserve a consistent
      open foreground zone (left-center) so the building image composites on top.
      Only the Day side is generated from this prompt; the Night backdrop is derived
      from the Day image (relight-only image-to-image edit) so both share the zone.
    * building_prompt - a SELF-CONTAINED prompt (style NOT appended) for the wonder's
      structure as an ISOLATED monument on a TRANSPARENT background (generated with
      background=transparent), composed as distinct vertical construction tiers (one
      per stage, bottom-to-top) so the UI can reveal built stages and dotted-outline
      the unbuilt ones. Only the Day monument is generated from this prompt; the
      Night monument is derived from the Day image (relight-only edit).
  transcribed_ages: [I, II, III]
  notation:
    age: >
      The age this card belongs to, one of I, II, or III. Every entry under the
      top-level `cards:` list carries this field; the deck is a single flat list
      rather than being grouped by age.
    benefit: >
      This is an unused field, but it can be used by any other game engine
      reading this card list to identify the behavior of a card. There are a few
      basic principals for how this structured layout is done. It can be
      {produces: [clay] } which says the card produces one of the specified
      resources. It has optional `tradable` field (determines if the resource
      is tradable with its neighbors), and `amount` if it produces two or more.
      { trade: [clay, ore], direction: left } to reduce the trade amount to 1
      coin when traded in the direction specified
      { sci: [compass] } when the card produces one of the specified science
      tokens
      { coin: 1 } for it producing number of coins immediately
      { vp: 1 } for it being worth the number of vp points
      The last two fields can be combined with { criteria: [military], direction: both }
      to make the card dependent on how many of such cards (or wonder stages)
      exist in the specified direction.
    appears_at: >
      Player counts at which a copy of the card enters the deck. e.g. [3, 4]
      = one copy present from 3 players, a second copy added at 4 players
      (the "3+ 4+" labels on the tech tree). Guilds show only "3+".
    build_cost: >
      A {resource: count} mapping of what is required to build the card, e.g.
      { wood: 1, ore: 2 }. An empty dict { } means free (no cost). Resource
      keys: wood, stone, ore, clay, glass, papyrus, loom, coin.
    chain_symbols: >
      banner.chain_out_symbol is a list (0-2) of the building-power symbols this
      card displays on the right of its title banner; a later card whose
      banner.chain_in_symbol matches one of them can be built for FREE. Symbol
      names key the artwork in seven_wonders_icons.svg (undrawn ones render as a
      small placeholder disc).
    medallion: >
      The central benefit medallion. It is a STRUCTURED layout with the defined
      as { arrows: both|left|right|all|none, tokens: [ ... ] } where each
      token is a map such as { coin: 1 }, { vp: 1 }, { wonder: partial, vp: 7 },
      { card: brown, vp: 1 (optional), coin: 2 (optional) }, shield, slash,
      { sci: compass|gear|tablet }, { entity: RawResources|ManufacturedGoods },
      or { res: wood|stone|ore|clay|glass|papyrus|loom }.

# --- type -> color -> banner end-tab symbol -------------------------
# The small symbol on the two ends of the title scroll keys the card type.
# Look these up from a card's `type`; they are not repeated per card.
card_types:
  raw_material:
    color: brown
    banner_end_symbol: square
    verified_from: [card_1, card_2]
  manufactured_good:
    color: grey
    banner_end_symbol: diamond
    verified_from: [card_7]
  civilian:
    color: blue
    banner_end_symbol: tablet
    verified_from: [card_3]
  commercial:
    color: yellow
    banner_end_symbol: circle
    verified_from: [card_4, card_6]
  military:
    color: red
    banner_end_symbol: cross_x
    verified_from: [card_5]
  scientific:
    color: green
    banner_end_symbol: triangle
    verified_from: [more_cards2 green faces]
  guild:
    color: purple
    banner_end_symbol: star
    verified_from: [more_cards1 guild faces]

wonders:
- name: Alexandria (Day)
  id: alexandria_day
  illustration_prompt: |
    The great Lighthouse of Pharos towering over the harbour of Alexandria at midday: a three-tiered pale-stone tower with a square base, octagonal middle and round lantern top crowned by a bronze mirror trailing a thin plume of smoke. A busy Ptolemaic port below with sailing ships, palm-lined quays and gulls against a clear blue Mediterranean sky.
  background_prompt: |
    A wide daylight panorama of the ancient port of Alexandria: a calm turquoise Mediterranean harbour, stone breakwaters and moored sailing ships, palm-lined quays and low sun-washed Ptolemaic-Egyptian rooftops receding into haze. Painterly semi-realistic classical-antiquity digital painting, muted earthy palette, soft atmospheric depth, no text, no borders, no frame; landscape panorama backdrop, slightly desaturated, with the central foreground left as an open stone jetty platform where a monument will rise.
  building_prompt: |
    The Lighthouse of Pharos as an isolated monument on a plain flat neutral background: a tall pale-stone tower built in three clearly defined but connected tiers stacked bottom-to-top - a wide square fortress-like base, a narrower octagonal mid-section, and a small round lantern crowned by a bronze mirror and flame. Painterly semi-realistic classical-antiquity render, even neutral lighting, no scenery, no text, no borders, so each of the three stages reads as a distinct band, while the monument stays one single, continuous, physically connected structure with no gaps between the tiers.
  resource: glass
  stages:
  - effects:
    - vp: 3
    build_cost:
      stone: 2
    banner:
      medallion:
        arrows: none
        tokens:
        - vp: 3
  - effects:
    - produces: [wood, stone, clay, ore]
      tradable: false
    build_cost:
      ore: 2
    banner:
      medallion:
        arrows: none
        tokens:
        - res: wood
        - slash
        - res: stone
        - slash
        - res: clay
        - slash
        - res: ore
  - effects:
    - vp: 7
    build_cost:
      papyrus: 1
      loom: 1
    banner:
      medallion:
        arrows: none
        tokens:
        - vp: 7
